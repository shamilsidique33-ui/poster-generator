<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Praveshanolsavam Poster</title>
<style>
body{
font-family:Arial;
text-align:center;
padding:20px;
}
canvas{
max-width:100%;
border:1px solid #ccc;
}
</style>
</head>
<body>

<h2>സ്കൂൾ പ്രവേശനോത്സവം 2026</h2>

<input type="file" id="photo"><br><br>

<input type="text" id="name" placeholder="കുട്ടിയുടെ പേര്"><br><br>

<button onclick="createPoster()">Create Poster</button>

<br><br>

<canvas id="canvas"></canvas>

<br><br>

<a id="download" download="poster.jpg">Download Poster</a>

<script>

function createPoster(){

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const template=new Image();
template.src="template.jpg";

template.onload=function(){

canvas.width=template.width;
canvas.height=template.height;

ctx.drawImage(template,0,0);

const file=document.getElementById("photo").files[0];

if(file){

const img=new Image();

img.onload=function(){

/* PHOTO POSITION */

ctx.drawImage(
img,
40,
780,
250,
320
);

/* NAME POSITION */

ctx.font="40px Arial";
ctx.fillStyle="black";
ctx.fillText(
document.getElementById("name").value,
70,
1180
);

document.getElementById("download").href=
canvas.toDataURL("image/jpeg");

};

img.src=URL.createObjectURL(file);

}

};

}

</script>

</body>
</html>
