<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>സ്കൂൾ പ്രവേശനോത്സവം 2026</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
    color:#4b0082;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    background:#4b0082;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#35005c;
}

canvas{
    max-width:100%;
    margin-top:20px;
    border:1px solid #ccc;
}

.download-btn{
    display:inline-block;
    margin-top:15px;
    background:green;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>സ്കൂൾ പ്രവേശനോത്സവം 2026</h2>

<input type="file" id="photo" accept="image/*"><br>

<input type="text" id="name" placeholder="വിദ്യാർത്ഥിയുടെ പേര്">

<input type="text" id="class" placeholder="ക്ലാസ്">

<input type="text" id="section" placeholder="സെക്ഷൻ">

<br>

<button onclick="createPoster()">Create Poster</button>

<br>

<canvas id="canvas"></canvas>

<br>

<a id="download" class="download-btn" download="poster.jpg">
Download Poster
</a>

</div>

<script>

function createPoster(){

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const template = new Image();

/* CHANGE IF NEEDED */
template.src = "template.jpg.jpg";

template.onload = function(){

canvas.width = template.width;
canvas.height = template.height;

ctx.drawImage(template,0,0);

const file = document.getElementById("photo").files[0];

if(!file){
alert("Photo upload ചെയ്യുക");
return;
}

const img = new Image();

img.onload = function(){

/* PHOTO POSITION */
ctx.drawImage(
img,
40,
780,
250,
320
);

/* NAME */
ctx.font = "bold 35px Arial";
ctx.fillStyle = "black";
ctx.fillText(
document.getElementById("name").value,
90,
1285
);

/* CLASS */
ctx.font = "30px Arial";
ctx.fillText(
document.getElementById("class").value,
120,
1360
);

/* SECTION */
ctx.font = "30px Arial";
ctx.fillText(
document.getElementById("section").value,
120,
1435
);

document.getElementById("download").href =
canvas.toDataURL("image/jpeg",1.0);

};

img.src = URL.createObjectURL(file);

};

}

</script>

</body>
</html>
